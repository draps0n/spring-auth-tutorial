spring:
  application:
    name: spring-auth-tutorial
  profiles:
    default: 

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/auth_tutorial
    username: postgres
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
      hikari:
        auto-commit: false

  sql:
    init:
      mode: always

  tokens:
    jwt:
      secret: ${JWT_SECRET_KEY}
      access_expiration: 7200 # in seconds
    cookie:
      refresh-token:
        expires-in: 604800
      access-token:
        expires-in: 7200
    other:
      refresh_expiration: 604800
      temp_access_expiration: 600

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - profile
              - email
              - https://www.googleapis.com/auth/user.birthday.read

logging:
  level:
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.security.oauth2.client: DEBUG

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

app:
  front-url: http://localhost:4200

server:
  port: 8080 # 8443 for https
  ssl:
    enabled: false # if true, then uncomment section below -> +bash command to generate keystore.p12
#    key-store: classpath:keystore.p12
#    key-store-password: password123
#    key-store-type: PKCS12
#    key-alias: springboot
